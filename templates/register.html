{% extends "base.html" %}
{% block title %}Register | NCP Auth Demo{% endblock %}
{% block content %}
<section class="card auth-card">
  <p class="eyebrow">Create Account</p>
  <h1>회원가입</h1>
  <p class="lead">간단한 계정을 생성하고 로그인해 보세요.</p>

  <form method="post" class="auth-form">
    <label for="username">아이디</label>
    <input id="username" name="username" type="text" minlength="3" required />

    <label for="email">이메일</label>
    <input id="email" name="email" type="email" required />

    <label for="password">비밀번호</label>
    <input id="password" name="password" type="password" minlength="8" required />

    <label for="confirm_password">비밀번호 확인</label>
    <input id="confirm_password" name="confirm_password" type="password" minlength="8" required />

    <button type="submit" class="btn btn-primary btn-block">계정 생성</button>
  </form>

  <p class="helper">
    이미 계정이 있나요?
    <a href="{{ url_for('login') }}">로그인</a>
  </p>
</section>
{% endblock %}
