name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:${{ github.sha }}

  image-security-gate:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Trivy image scan (HIGH/CRITICAL fail)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/my-ncp:${{ github.sha }}
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          format: "table"

  deploy:
    needs: [build-and-push, image-security-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NCP_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.NCP_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote deploy directory
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}" "mkdir -p ~/my_repo"

      - name: Copy deploy files
        run: |
          scp -i ~/.ssh/id_rsa -r docker-compose.yml nginx \
            "${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}:~/my_repo/"

      - name: Deploy on NCP
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}" "
            cd ~/my_repo &&
            docker compose pull &&
            docker compose up -d --remove-orphans
          "
