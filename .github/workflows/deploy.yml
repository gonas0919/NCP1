name: CI/CD Pipeline (Docker Hub Pro Version)

# 1. 언제 로봇이 출동할 것인가? (main 브랜치에 코드가 push 될 때)
on:
  push:
    branches: [ "master" ]

jobs:
  # ==========================================================
  # [CI 단계] 깃허브 로봇이 도커 이미지를 구워서 도커 허브에 올림
  # ==========================================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 최신 코드 가져오기 (Checkout)
        uses: actions/checkout@v3

      - name: 도커 허브에 로그인하기
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 도커 이미지 빌드하고 도커 허브로 밀어 올리기 (Push)
        # docker-compose.yml을 보고 로봇이 알아서 굽고 포장합니다.
        run: |
          docker compose build
          docker compose push

  # ==========================================================
  # [CD 단계] NCP 서버에 접속해서 최신 밀키트를 데우기
  # ==========================================================
  deploy:
    needs: build-and-push # 주의! 위의 CI 단계가 성공해야만 이 CD 단계가 실행됩니다.
    runs-on: ubuntu-latest
    steps:
      - name: NCP 서버에 몰래 접속해서 배포 명령 내리기
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.NCP_HOST }}
          username: ${{ secrets.NCP_USER }}
          key: ${{ secrets.NCP_SSH_KEY }}
          port: 22
          # 아래 script가 실제로 NCP 서버 안에서 쳐지는 명령어입니다.
          script: |
            # 1. 선생님의 NCP 서버 안의 프로젝트 폴더로 이동 (경로는 본인에 맞게 수정!)
            cd /tmp/my_repo
            
            # 2. 변경된 설정 파일(docker-compose.yml 등)만 가볍게 가져옴
            git pull origin main
            
            # 3. 도커 허브에서 방금 구워진 따끈따끈한 최신 이미지를 다운로드 (빌드 부하 0!)
            docker compose pull
            
            # 4. 헌 방(기존 컨테이너)은 끄고, 새 방(최신 컨테이너)으로 다시 켬!
            docker compose up -d